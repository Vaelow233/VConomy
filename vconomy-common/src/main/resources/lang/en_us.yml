help:
  admin:
    - "&6VConomy Help"
    - "&a/vconomy reload   &b- Reload the plugin"
    - "&a/vconomy add/give <player> <type> <balance>   &b- Give the player specific balance"
    - "&a/vconomy take <player> <type> <balance>   &b- Take the player specific balance"
    - "&a/vconomy set <player> <type> <balance>   &b- Set the player specific balance"
    - "&a/vconomy reset <player> [type]   &b- Reset the player specific balance"
    - "&a/vconomy get/show <type> [player]   &b- Show the player specific balance"
    - "&a/vconomy top <type> [page]   &b- Show the balance top of the specific balance type"
    - "&a/balancetop <type> [page]   &b- Same as /vconomy top"
    - "&a/balance <type> [player]   &b- Same as /vconomy get"
    - "&a/pay <player> <type> <balance>   &b- Pay the player specific balance"
  player:
    - "&6VConomy Help"
    - "&a/vconomy get/show <type>   &b- Show the specific balance"
    - "&a/vconomy top <type> [page]   &b- Show the balance top of the specific balance type"
    - "&a/balancetop <type> [page]   &b- Same as /vconomy top"
    - "&a/balance <type>   &b- Same as /vconomy get"
    - "&a/pay <player> <type> <balance>   &b- Pay the player specific balance"

balance_top:
  title: "&6VConomy Balance Top &a({type})"
  line: "&b- {player}: &e{balance}"
  footer: "&dPage {page}"

